<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Novelia</title>
    <script type="text/javascript">
      // Redirect all 404 errors to the index.html with the original path
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/novelia' +
        l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1).slice(0, pathSegmentsToKeep * -1).slice(1) +
        '?' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').split('?')[0] +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      )
    </script>
  </head>
  <body>
  </body>
</html>
